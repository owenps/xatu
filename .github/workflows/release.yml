name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              output="dist/xatu-${os}-${arch}"
              GOOS=$os GOARCH=$arch go build -ldflags="-s -w" -o "$output" ./cmd/xatu
              sha256sum "$output" >> dist/checksums.txt
            done
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/xatu-*
            dist/checksums.txt
